<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background squircle gradient: deep forest agricultural slate/green -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14532d" />
      <stop offset="50%" stop-color="#062f17" />
      <stop offset="100%" stop-color="#02140a" />
    </linearGradient>
    
    <!-- Sprout gradient: ultra vibrant green to brand green -->
    <linearGradient id="sproutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>

    <!-- Glow/Shadow filter for premium modern look -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Premium Squircle Background -->
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#bgGrad)" stroke="#16a34a" stroke-width="1.5" />

  <!-- Glowing Vegrin Sprout Logo -->
  <g transform="translate(28, 26) scale(3)" filter="url(#glow)">
    <path d="M7 20h10" stroke="url(#sproutGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M10 20c5.5-2.5 8-6.4 8-12a4 4 0 0 0-8 0c0 5.6 2.5 9.5 8 12Z" fill="url(#sproutGrad)" fill-opacity="0.15" stroke="url(#sproutGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M10 12.1a12.1 12.1 0 0 0-3.5-6.8a4 4 0 0 0-6.8 3.5c0 3.3 2.7 5.6 6.8 5.6Z" fill="url(#sproutGrad)" fill-opacity="0.15" stroke="url(#sproutGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M12 10a10 10 0 0 1-3.5-3.5" stroke="url(#sproutGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
